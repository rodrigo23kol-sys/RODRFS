<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade de Tabuada - CM AJM</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #2980b9;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Courier New', Courier, monospace; /* Fonte que lembra atividade impressa */
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase; /* Tudo em caixa alta conforme sua preferência */
        }

        .container {
            background: white;
            padding: 2rem;
            border: 2px solid #000;
            width: 100%;
            max-width: 500px;
            box-shadow: 10px 10px 0px #ccc;
        }

        .header-print {
            text-align: left;
            border-bottom: 2px solid #000;
            margin-bottom: 20px;
            padding-bottom: 10px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input[type="text"], input[type="number"] {
            border: none;
            border-bottom: 1px solid #000;
            outline: none;
            font-family: inherit;
            font-size: 1rem;
            text-transform: uppercase;
        }

        #student-name { width: 80%; }
        #student-grade { width: 50px; }

        .question { 
            font-size: 5rem; 
            font-weight: bold; 
            margin: 20px 0; 
            color: #000;
        }

        .game-input {
            font-size: 4rem !important;
            width: 180px !important;
            border: 3px solid #000 !important;
            text-align: center;
        }

        .btn {
            background: #000;
            color: #fff;
            padding: 15px;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: bold;
        }

        .hidden { display: none; }

        .final-report {
            text-align: left;
            line-height: 2;
        }

        .progress {
            font-size: 0.8rem;
            margin-bottom: 5px;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- CABEÇALHO PADRÃO -->
    <div class="header-print">
        COLÉGIO MUNICIPAL ANTÔNIO JOAQUIM DE MIRANDA<br>
        ALUNO: <input type="text" id="student-name" placeholder="________________"><br>
        TURMA: <input type="text" id="student-grade" placeholder="____"> 
        DATA: <span id="current-date"></span>
    </div>

    <!-- TELA INICIAL -->
    <div id="setup-screen">
        <h3 style="text-align:center">DESAFIO DE TABUADA (1 AO 5)</h3>
        <p style="text-align:center">RESOLVA 20 QUESTÕES O MAIS RÁPIDO POSSÍVEL!</p>
        <button class="btn" onclick="startGame()">INICIAR ATIVIDADE</button>
    </div>

    <!-- TELA DE JOGO -->
    <div id="game-screen" class="hidden">
        <div class="progress">QUESTÃO <span id="q-count">1</span> / 20</div>
        <div class="question" id="q-text">-- X --</div>
        <input type="number" id="ans-input" class="game-input" autocomplete="off">
    </div>

    <!-- TELA FINAL -->
    <div id="end-screen" class="hidden">
        <h2 style="text-align:center">ATIVIDADE CONCLUÍDA!</h2>
        <div class="final-report" id="report-content"></div>
        <button class="btn" onclick="location.reload()">REINICIAR</button>
    </div>
</div>

<script>
    // Preencher a data automaticamente
    const d = new Date();
    document.getElementById('current-date').innerText = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;

    let current = 0;
    const total = 20;
    let start, target;

    const input = document.getElementById('ans-input');

    function startGame() {
        const name = document.getElementById('student-name').value;
        if (!name) {
            alert("POR FAVOR, DIGITE O NOME DO ALUNO.");
            return;
        }
        
        start = Date.now();
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        generate();
    }

    function generate() {
        const n1 = Math.floor(Math.random() * 5) + 1; // 1 a 5
        const n2 = Math.floor(Math.random() * 10) + 1; // 1 a 10
        target = n1 * n2;
        
        document.getElementById('q-text').innerText = `${n1} X ${n2}`;
        document.getElementById('q-count').innerText = current + 1;
        input.value = '';
        input.focus();
    }

    input.addEventListener('input', () => {
        if (parseInt(input.value) === target) {
            current++;
            if (current < total) {
                generate();
            } else {
                finish();
            }
        }
    });

    function finish() {
        const totalTime = ((Date.now() - start) / 1000).toFixed(1);
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        
        const name = document.getElementById('student-name').value;
        const grade = document.getElementById('student-grade').value || "____";

        document.getElementById('report-content').innerHTML = `
            ----------------------------------<br>
            ALUNO: ${name}<br>
            TURMA: ${grade}<br>
            TEMPO TOTAL: ${totalTime} SEGUNDOS<br>
            MÉDIA: ${(totalTime/20).toFixed(2)} SEG POR QUESTÃO<br>
            ----------------------------------<br>
            SITUAÇÃO: FINALIZADO COM SUCESSO
        `;
    }
</script>

</body>
</html>
